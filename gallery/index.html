<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gallery</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style type="text/css">
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        a:link {
            text-decoration: none;
        }
        .grid {
            display: grid;
            max-width: 100%;
            width: 100%;
            min-height: 400px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(19%, 1fr));
            grid-auto-rows: 40px;
            grid-gap: 5px;
        }
        .item {
            width: 100%;
            background-color: bisque;
            /* overflow: hidden; */
            /* position: relative; */
        }
        .item > img {
            width: 100%;
            /* position: absolute; */
            /* left: 50%;
            top: 50%; */
            /* transform: translate(-50%, -50%); */
        }
    </style>
</head>
<body>
    <div class="grid">
    </div>
    <script type="text/javascript">
        grid = document.querySelector(".grid");
        function SetGridItemHeight() {
            let rows = 0;
            let rowHeight = parseInt(window.getComputedStyle(grid)["grid-auto-rows"]);
            let rowGap = parseInt(window.getComputedStyle(grid)["grid-row-gap"]);
            let items = grid.querySelectorAll(".item");
            items.forEach(item => {
                let span = Math.ceil((item.querySelector("img").offsetHeight + item.querySelector("p").offsetHeight)/(rowHeight + rowGap));
                item.style.gridRowEnd = `span ${span}`;
                rows += span;
                // item.style.gridRowEnd = `span ${item.clientHeight}`;
            });
            // alert(rows);
        }
        window.addEventListener("load", SetGridItemHeight);
        window.addEventListener("resize", SetGridItemHeight);
        url = new URL(document.URL);
        protocol = url.protocol;
        category = url.searchParams.get("category");
        num = parseInt(url.searchParams.get("num"));

        fetch("list.json")
        .then(response => response.json())
        .then(json => {
            list = json;
            all = [];
            for (let category in list) {
                all = [...all, ...list[category]];
            }
            all.sort();

            if (category) {
                iter = list[category];
                count = list[category].length;
            }
            else {
                iter = all;
                count = num? num : all.length;
            }
            for (i=0; i<count; i++) {
                let prefix = "http://crazytempler.ipdisk.co.kr:4569/publist/HDD1/Public/djmax";
                // let prefix = `${protocol}//d2wwh0934dzo2k.cloudfront.net/djmax`;
                let item = document.createElement("a");
                item.className = "item";
                item.href = `${prefix}/original/${iter[i]}`;
                item.target = "_blank";
                // let div = document.createElement("div");
                let img = document.createElement("img");
                img.src = `${prefix}/thumbnail/${iter[i]}`;
                // img.loading = "lazy";
                // img.onload = SetGridItemHeight;
                let p = document.createElement("p");
                p.textContent = iter[i].slice(4,-4);
                // div.appendChild(img);
                item.appendChild(img);
                item.appendChild(p);
                grid.appendChild(item);
            }
            SetGridItemHeight();
        });
    </script>
</body>
</html>
