<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gallery</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style type="text/css">
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        a:link {
            text-decoration: none;
        }

        #menu {
            text-align: center;
            margin-top: 15vh;
            list-style-type: none;
        }
        #menu li {
            margin: 1em;
        }
        #menu img {
            width: 10%;
        }

        @media ( max-width: 768px ) {
            #menu {
                margin-top: 0;
            }
            #menu li {
                margin: 0.5em;
            }
            #menu img {
                width: 50%;
            }
        }

        .grid {
            display: grid;
            max-width: 100%;
            width: 100%;
            min-height: 400px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(19%, 1fr));
            grid-auto-rows: 40px;
            grid-gap: 5px;
        }
        .item {
            width: 100%;
            background-color: bisque;
            /* overflow: hidden; */
            /* position: relative; */
        }
        .item > img {
            width: 100%;
            /* position: absolute; */
            /* left: 50%;
            top: 50%; */
            /* transform: translate(-50%, -50%); */
        }
    </style>
</head>
<body>
    <ul id="menu">
        <li><a href="./?category=all"><img src="../img/category_all.png"></a></li>
        <li><a href="./?category=respect"><img src="../img/category_respect.png"></a></li>
        <li><a href="./?category=portable1/2"><img src="../img/category_portable1.png"><img src="../img/category_portable2.png"></a></li>
        <li><a href="./?category=portable3"><img src="../img/category_portable3.png"></a></li>
        <li><a href="./?category=trilogy"><img src="../img/category_trilogy.png"></a></li>
        <li><a href="./?category=clazziquai"><img src="../img/category_clazziquai.png"></a></li>
        <li><a href="./?category=blacksquare"><img src="../img/category_blacksquare.png"></a></li>
        <li><a href="./?category=vextension"><img src="../img/category_vextension.png"></a></li>
        <li><a href="./?category=technika1"><img src="../img/category_technika1.png"></a></li>
        <li><a href="./?category=technika2"><img src="../img/category_technika2.png"></a></li>
        <li><a href="./?category=technika3"><img src="../img/category_technika3.png"></a></li>
    </ul>
    <div class="grid">
    </div>
    <script type="text/javascript">
        grid = document.querySelector(".grid");
        menu = document.querySelector("#menu");
        function SetGridItemHeight() {
            let rows = 0;
            let rowHeight = parseInt(window.getComputedStyle(grid)["grid-auto-rows"]);
            let rowGap = parseInt(window.getComputedStyle(grid)["grid-row-gap"]);
            let items = grid.querySelectorAll(".item");
            items.forEach(item => {
                let span = Math.ceil((item.querySelector("img").offsetHeight + item.querySelector("p").offsetHeight)/(rowHeight + rowGap));
                item.style.gridRowEnd = `span ${span}`;
                // rows += span;
                // item.style.gridRowEnd = `span ${item.clientHeight}`;
            });
            // alert(rows);
        }
        // window.addEventListener("load", SetGridItemHeight);
        window.addEventListener("resize", SetGridItemHeight);
        url = new URL(document.URL);
        protocol = url.protocol;
        category = url.searchParams.get("category");
        num = parseInt(url.searchParams.get("num"));
        prefix = `${protocol}//d2wwh0934dzo2k.cloudfront.net/djmax`;

        fetch("list.json")
        .then(response => response.json())
        .then(json => {
            list = json;
            all = Object.values(list).reduce((a, b) => [...a, ...b]);
            all.sort();

            if (category) {
                menu.remove();
                iter = (category == "all")? all : list[category];
                iter.forEach(i => {
                    let item = document.createElement("a");
                    item.className = "item";
                    item.href = `${prefix}/original/${i}`;
                    item.target = "_blank";
                    // let div = document.createElement("div");
                    let img = document.createElement("img");
                    img.src = `${prefix}/thumbnail/${i}`;
                    img.loading = "lazy";
                    img.onload = SetGridItemHeight;
                    let p = document.createElement("p");
                    p.textContent = i.slice(4,-4);
                    // div.appendChild(img);
                    item.appendChild(img);
                    item.appendChild(p);
                    grid.appendChild(item);
                });
            }
            else {
                grid.remove();
            }
        });
    </script>
</body>
</html>
