<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>디제이맥스 리스펙트 랜덤 선곡</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css' title="myCSS">
</head>
<body class="center">
    <div>
        <img id="happy" src="so happy.webp">
        <p id="intro" class="shadow-white">공방에서 랜덤으로 고르고 싶을 때 사용해보세요.</p>
    </div>
    <div id="select">
        <div id="modeSelect">
            <label class="shadow-white"><input type="radio" name="mode" value="PC">PC</label>
            <label class="shadow-white"><input type="radio" name="mode" value="PS4">PS4</label>
            <!-- <label class="shadow-white"><input type="radio" name="mode" value="artist">작곡가별 곡 목록</label> -->
        </div>
        <div id="dlcSelect">
            <table id="dlcCheckbox">
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
            </table>
        </div>
        <div id="levelSelect">
            <label class="shadow-white"><input type="checkbox" id="levelCheck">난이도 조건</label>
            <div id="buttonSelect">
                <label class="shadow-white"><input type="checkbox" value="4B">4B</label>
                <label class="shadow-white"><input type="checkbox" value="5B">5B</label>
                <label class="shadow-white"><input type="checkbox" value="6B">6B</label>
                <label class="shadow-white"><input type="checkbox" value="8B">8B</label>
            </div>
            <div>
                <span class="shadow-white">난이도 </span>
                <select id="levelList">
                    <option value="" selected disabled hidden></option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                </select>
                <span class="shadow-white"> 이상</span>
            </div>
        </div>
    </div>
    <div id="pick"><button type="button" id="run" disabled>로딩...</button></div>
    <div id="result">
        <ol></ol>
    </div>
    <script type="text/javascript" src="main.js"></script>
</body>
</html>
